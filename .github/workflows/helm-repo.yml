name: helm-repo

on:
  pull_request:
    paths:
      - ".github/workflows/helm-repo.yml"
      - "Makefile"
      - "artifacthub-repo.yml"
      - "charts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/helm-repo.yml"
      - "Makefile"
      - "artifacthub-repo.yml"
      - "charts/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
        with:
          version: v4.2.0
      - name: Build and verify Helm repository
        run: make verify
      - name: Configure Git
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Sync chart index metadata
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          worktree="$(mktemp -d)"
          create_branch=0
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add -B gh-pages "$worktree" origin/gh-pages
          else
            create_branch=1
            git worktree add --detach "$worktree"
          fi
          cd "$worktree"
          if [ "$create_branch" = 1 ]; then
            git switch --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "$GITHUB_WORKSPACE"/artifacthub-repo.yml .
          cp "$GITHUB_WORKSPACE"/README.md .
          touch .nojekyll
          git add .nojekyll README.md artifacthub-repo.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: sync helm repo metadata"
          git push origin HEAD:gh-pages
      - name: Release Helm charts
        if: github.event_name != 'pull_request'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_existing: true
          pages_branch: gh-pages
          mark_as_latest: false
        env:
          CR_TOKEN: ${{ github.token }}

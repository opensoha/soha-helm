name: helm-repo

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v4.2.0
      - name: Verify Helm repository
        run: |
          set -euo pipefail
          test -f .nojekyll
          test -f README.md
          test -f artifacthub-repo.yml
          test -f index.yaml
          test -s soha-0.1.0.tgz
          test -s soha-agent-0.1.0.tgz
          test -s soha-hermes-agent-0.1.0.tgz
          helm show chart soha-0.1.0.tgz >/dev/null
          helm show chart soha-agent-0.1.0.tgz >/dev/null
          helm show chart soha-hermes-agent-0.1.0.tgz >/dev/null
          export HELM_REPOSITORY_CONFIG=/tmp/soha-helm-repositories.yaml
          export HELM_REPOSITORY_CACHE=/tmp/soha-helm-cache
          mkdir -p "$HELM_REPOSITORY_CACHE"
          python3 -m http.server 8879 >/tmp/soha-helm-http.log 2>&1 &
          server_pid="$!"
          trap 'kill "$server_pid"' EXIT
          for _ in 1 2 3 4 5; do
            curl -fsS http://127.0.0.1:8879/index.yaml >/dev/null && break
            sleep 1
          done
          helm repo add opensoha http://127.0.0.1:8879
          helm repo update
          helm search repo opensoha/soha --version 0.1.0 | grep 'opensoha/soha'
          mkdir -p /tmp/soha-helm-pull
          helm pull opensoha/soha --version 0.1.0 --destination /tmp/soha-helm-pull

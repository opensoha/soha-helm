name: pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage Helm repository
        run: |
          set -euo pipefail
          mkdir -p public
          cp .nojekyll README.md index.yaml *.tgz public/
          if [ -f artifacthub-repo.yml ]; then
            cp artifacthub-repo.yml public/
          fi
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4

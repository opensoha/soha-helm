{{- $existingSecretName := printf "%s-config" (include "soha.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $existingSecretName -}}
{{- $existingSecretData := dict -}}
{{- if $existingSecret -}}
{{- $existingSecretData = default dict $existingSecret.data -}}
{{- end -}}
{{- $existingConfig := dict -}}
{{- $existingConfigData := get $existingSecretData "config.yaml" -}}
{{- if $existingConfigData -}}
{{- $existingConfig = fromYaml ($existingConfigData | b64dec) -}}
{{- end -}}
{{- $existingPostgresPassword := "" -}}
{{- if hasKey $existingSecretData "postgres-password" -}}
{{- $existingPostgresPassword = index $existingSecretData "postgres-password" | b64dec -}}
{{- end -}}
{{- if not $existingPostgresPassword -}}
{{- $existingPostgresPassword = dig "database" "password" "" $existingConfig -}}
{{- end -}}
{{- if and (not .Values.postgres.enabled) (not (trim (default "" .Values.postgres.password))) (not $existingPostgresPassword) -}}
{{- fail "postgres.password is required on first install when postgres.enabled=false" -}}
{{- end -}}
{{- $postgresPassword := include "soha.secretValue" (dict "name" "postgres.password" "value" .Values.postgres.password "existing" $existingPostgresPassword "length" 48) -}}
{{- $adminPassword := include "soha.secretValue" (dict "name" "config.auth.adminPassword" "value" .Values.config.auth.adminPassword "existing" (dig "auth" "dev_principal" "password" "" $existingConfig) "length" 48) -}}
{{- $jwtSecret := include "soha.secretValue" (dict "name" "config.auth.jwtSecret" "value" .Values.config.auth.jwtSecret "existing" (dig "auth" "jwt" "secret" "" $existingConfig) "length" 64) -}}
{{- $runnerToken := include "soha.secretValue" (dict "name" "config.runtime.executionRunnerToken" "value" .Values.config.runtime.executionRunnerToken "existing" (dig "runtime" "execution_runner_token" "" $existingConfig) "length" 64) -}}
{{- $webhookToken := include "soha.secretValue" (dict "name" "config.monitoring.webhookToken" "value" .Values.config.monitoring.webhookToken "existing" (dig "monitoring" "webhook_token" "" $existingConfig) "length" 64) -}}
{{- $credentialKey := trim (default "" .Values.config.security.credentialEncryptionKey) -}}
{{- if and .Values.config.modules.virtualization.enabled (not $credentialKey) -}}
{{- fail "config.security.credentialEncryptionKey is required when config.modules.virtualization.enabled=true" -}}
{{- end -}}
{{- if $credentialKey -}}
{{- $credentialKey = include "soha.secretValue" (dict "name" "config.security.credentialEncryptionKey" "value" $credentialKey "length" 64) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soha.fullname" . }}-config
  labels:
    {{- include "soha.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ $postgresPassword | quote }}
  config.yaml: |
    app:
      name: soha
      env: {{ .Values.config.appEnv | quote }}
    http:
      addr: :8080
      base_path: {{ .Values.config.basePath | quote }}
      read_timeout: 15s
      write_timeout: 15s
      cors_allowed_origins:
{{- range .Values.config.corsAllowedOrigins }}
        - {{ . | quote }}
{{- end }}
    logger:
      level: {{ .Values.config.loggerLevel | quote }}
      format: {{ .Values.config.loggerFormat | quote }}
    runtime:
      workflow_workers: {{ .Values.config.runtime.workflowWorkers }}
      workflow_queue_size: {{ .Values.config.runtime.workflowQueueSize }}
      workflow_node_parallelism: {{ .Values.config.runtime.workflowNodeParallelism }}
      cluster_sync_parallelism: {{ .Values.config.runtime.clusterSyncParallelism }}
      copilot_inspection_parallelism: {{ .Values.config.runtime.copilotInspectionParallelism }}
      alert_upsert_batch_size: {{ .Values.config.runtime.alertUpsertBatchSize }}
      execution_runner_token: {{ $runnerToken | quote }}
    database:
      driver: postgres
      host: {{ include "soha.postgresHost" . | quote }}
      port: {{ .Values.postgres.port }}
      name: {{ .Values.postgres.database | quote }}
      user: {{ .Values.postgres.username | quote }}
      password: {{ $postgresPassword | quote }}
      sslmode: disable
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime: 1h
      auto_migrate: true
      migration_file: /app/migrations/postgres/0001_init.sql
    auth:
      enable_dev_auth: {{ .Values.config.auth.enableDevAuth }}
      dev_principal:
        user_id: {{ .Values.config.auth.adminUserId | quote }}
        name: {{ .Values.config.auth.adminName | quote }}
        email: {{ .Values.config.auth.adminEmail | quote }}
        password: {{ $adminPassword | quote }}
        roles:
{{- range .Values.config.auth.adminRoles }}
          - {{ . | quote }}
{{- end }}
      jwt:
        issuer: {{ .Values.config.auth.jwtIssuer | quote }}
        secret: {{ $jwtSecret | quote }}
        access_ttl: {{ .Values.config.auth.accessTTL | quote }}
        refresh_ttl: {{ .Values.config.auth.refreshTTL | quote }}
      oidc:
        enabled: {{ .Values.config.auth.oidc.enabled }}
        provider_name: {{ .Values.config.auth.oidc.providerName | quote }}
        issuer: {{ .Values.config.auth.oidc.issuer | quote }}
        client_id: {{ .Values.config.auth.oidc.clientId | quote }}
        client_secret: {{ .Values.config.auth.oidc.clientSecret | quote }}
        redirect_url: {{ .Values.config.auth.oidc.redirectUrl | quote }}
        frontend_redirect_url: {{ .Values.config.auth.oidc.frontendRedirectUrl | quote }}
        scopes:
{{- range .Values.config.auth.oidc.scopes }}
          - {{ . | quote }}
{{- end }}
        default_roles:
{{- range .Values.config.auth.oidc.defaultRoles }}
          - {{ . | quote }}
{{- end }}
    gitlab:
      enabled: false
      base_url: https://gitlab.com/api/v4
      token: ""
      group_id: ""
      per_page: 50
      timeout: 10s
    monitoring:
      enabled: {{ .Values.config.monitoring.enabled }}
      webhook_token: {{ $webhookToken | quote }}
      prometheus_url: {{ .Values.config.monitoring.prometheusUrl | quote }}
      prometheus_bearer_token: {{ .Values.config.monitoring.prometheusBearerToken | quote }}
      prometheus_default_range_minutes: {{ .Values.config.monitoring.prometheusDefaultRangeMinutes }}
      prometheus_step_seconds: {{ .Values.config.monitoring.prometheusStepSeconds }}
      prometheus_cluster_label: {{ .Values.config.monitoring.prometheusClusterLabel | quote }}
      grafana_base_url: {{ .Values.config.monitoring.grafanaBaseUrl | quote }}
    swagger:
      enabled: {{ .Values.config.swaggerEnabled }}
      path: /swagger/*any
    mcp:
      enabled: {{ .Values.config.mcpEnabled }}
      default_timeout: 10s
    ai_gateway:
      rate_limit:
        backend: {{ .Values.config.aiGateway.rateLimit.backend | quote }}
        redis:
          addr: {{ .Values.config.aiGateway.rateLimit.redis.addr | quote }}
          username: {{ .Values.config.aiGateway.rateLimit.redis.username | quote }}
          password: {{ .Values.config.aiGateway.rateLimit.redis.password | quote }}
          db: {{ .Values.config.aiGateway.rateLimit.redis.db }}
          tls: {{ .Values.config.aiGateway.rateLimit.redis.tls }}
          key_prefix: {{ .Values.config.aiGateway.rateLimit.redis.keyPrefix | quote }}
          timeout: {{ .Values.config.aiGateway.rateLimit.redis.timeout | quote }}
    modules:
      delivery:
        enabled: {{ .Values.config.modules.delivery.enabled }}
      monitoring:
        enabled: {{ .Values.config.modules.monitoring.enabled }}
      ai:
        enabled: {{ .Values.config.modules.ai.enabled }}
      ai_gateway:
        enabled: {{ .Values.config.modules.aiGateway.enabled }}
      virtualization:
        enabled: {{ .Values.config.modules.virtualization.enabled }}
      docker:
        enabled: {{ .Values.config.modules.docker.enabled }}
      security:
        enabled: {{ .Values.config.modules.security.enabled }}
      cmdb:
        enabled: {{ .Values.config.modules.cmdb.enabled }}
    security:
      credential_encryption_key: {{ $credentialKey | quote }}
      secret_provider: {{ .Values.config.security.secretProvider | quote }}
    bootstrap:
      seed_defaults: {{ .Values.config.seedDefaults }}
    kubernetes:
      clusters: []

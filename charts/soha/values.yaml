image:
  repository: yshanchui/soha
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
replicaCount: 1

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: soha.example.com
  tls: false
  tlsSecretName: ""

postgres:
  enabled: true
  # PostgreSQL 18 stores PGDATA below /var/lib/postgresql/18/docker.
  # Keep the persistent volume mounted at /var/lib/postgresql in templates.
  image: postgres:18.4
  database: soha
  username: pgsql
  host: ""
  port: 5432
  # Generated on first install when empty, then reused from the live Secret
  # during upgrades. Set an explicit stable value for disaster recovery.
  password: ""
  storageSize: 10Gi

config:
  appEnv: production
  loggerLevel: info
  loggerFormat: json
  basePath: /api/v1
  corsAllowedOrigins:
    - https://soha.example.com
  runtime:
    workflowWorkers: 4
    workflowQueueSize: 64
    workflowNodeParallelism: 4
    clusterSyncParallelism: 4
    copilotInspectionParallelism: 2
    alertUpsertBatchSize: 100
    # Static bearer token accepted by runner/agent callback endpoints.
    # Generated on first install when empty, then reused from the live Secret during upgrades.
    executionRunnerToken: ""
  auth:
    enableDevAuth: false
    adminUserId: admin
    adminName: Admin
    adminEmail: admin@soha.local
    # Generated on first install when empty, then reused from the live Secret during upgrades.
    adminPassword: ""
    adminRoles:
      - admin
      - ops
      - auditor
    jwtIssuer: soha
    # Generated on first install when empty, then reused from the live Secret during upgrades.
    jwtSecret: ""
    accessTTL: 15m
    refreshTTL: 168h
    oidc:
      enabled: false
      providerName: default
      issuer: ""
      clientId: ""
      clientSecret: ""
      redirectUrl: https://soha.example.com/api/v1/auth/oidc/callback
      frontendRedirectUrl: https://soha.example.com/login/callback
      scopes:
        - openid
        - profile
        - email
      defaultRoles:
        - readonly
  monitoring:
    enabled: true
    # Generated on first install when empty, then reused from the live Secret during upgrades.
    webhookToken: ""
    prometheusUrl: ""
    prometheusBearerToken: ""
    prometheusDefaultRangeMinutes: 60
    prometheusStepSeconds: 60
    prometheusClusterLabel: cluster
    grafanaBaseUrl: ""
  modules:
    delivery:
      enabled: true
    monitoring:
      enabled: true
    ai:
      enabled: true
    aiGateway:
      enabled: true
    virtualization:
      # Enable only after setting config.security.credentialEncryptionKey to a
      # stable value. PVE credentials cannot be decrypted if this key rotates.
      enabled: false
    docker:
      enabled: true
    security:
      enabled: false
    cmdb:
      enabled: false
  swaggerEnabled: false
  mcpEnabled: true
  aiGateway:
    rateLimit:
      backend: postgres
      redis:
        addr: ""
        username: ""
        password: ""
        db: 0
        tls: false
        keyPrefix: soha:ai-gateway:rate-limit
        timeout: 500ms
  seedDefaults: true
  security:
    # Required when config.modules.virtualization.enabled=true.
    credentialEncryptionKey: ""
    secretProvider: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

podSecurityContext:
  runAsUser: 10001
  runAsGroup: 10001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
